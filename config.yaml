# Theosis — cấu hình "council".
# Mỗi slot là một endpoint OpenAI-compatible (đường dẫn .../v1).
# Key lấy từ biến môi trường qua `api_key_env` — KHÔNG ghi key thẳng vào file này.
#
# Base URL phổ biến (đều OpenAI-compatible):
#   OpenAI       https://api.openai.com/v1
#   Anthropic    https://api.anthropic.com/v1     (endpoint OpenAI-compat của Claude)
#   OpenRouter   https://openrouter.ai/api/v1
#   DeepSeek     https://api.deepseek.com/v1
#   xAI (Grok)   https://api.x.ai/v1
#   Groq         https://api.groq.com/openai/v1
#   Ollama local http://localhost:11434/v1        (đặt api_key: ollama)
#
# Mẹo thử nhanh không cần key: chạy với THEOSIS_DEMO=1 (model giả lập).

slots:
  - name: opus
    model: claude-opus-4-8          # ⚠️ đổi cho khớp tên model của provider
    base_url: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    system: "Bạn nghiêm ngặt, chính xác, không phỏng đoán bừa."
    enabled: true

  - name: gpt
    model: gpt-4o
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    system: "Bạn khai thác nhiều góc nhìn và đào sâu."
    enabled: true

  # ── Thêm slot chỉ bằng cách bỏ comment — không cần đụng code ──
  # - name: deepseek
  #   model: deepseek-chat
  #   base_url: https://api.deepseek.com/v1
  #   api_key_env: DEEPSEEK_API_KEY
  #   enabled: true
  #
  # - name: grok
  #   model: grok-4
  #   base_url: https://api.x.ai/v1
  #   api_key_env: XAI_API_KEY
  #   enabled: true
  #
  # - name: local
  #   model: llama3
  #   base_url: http://localhost:11434/v1
  #   api_key: ollama
  #   enabled: true

# Model đứng ra tổng hợp (= trần chất lượng). Chọn model phân biệt đúng/sai tốt nhất.
aggregator:
  name: aggregator
  model: claude-opus-4-8
  base_url: https://api.anthropic.com/v1
  api_key_env: ANTHROPIC_API_KEY

settings:
  max_rounds: 2
  strategy: round_robin       # ai chấm ai: round_robin | all_vs_all | star
  use_router: false           # bật = một model tự phân loại task → chọn model + chiến lược + vòng + executor
  # router: opus              # (tuỳ chọn) slot làm router; mặc định dùng aggregator
  auditors_per_answer: 1     # (chỉ áp dụng cho round_robin) mỗi câu bị bao nhiêu model soi; tối đa = số model − 1
  use_executor: false        # ⚠️ Bật = CHẠY code Python do model sinh ra (sandbox best-effort). Chỉ bật trên máy bạn kiểm soát. Xem SECURITY.md.
  use_memory: false           # bật = chèn "bài học đã ghi nhớ" (rule trừu tượng) liên quan vào prompt; ghi log metrics content-free
  auto_learn: false           # bật = tự rút rule khi executor (ground truth) bắt câu trả lời SAI (cần use_executor). Rule chưa verified.
  verified_only: false        # bật = chỉ tiêm rule ĐÃ DUYỆT vào prompt (cổng chất lượng; rule auto-learn chưa duyệt sẽ bị bỏ qua)
  summarize_history: false    # bật = hội thoại dài thì nén các lượt CŨ thành tóm tắt (thêm 1 lời gọi model khi kích hoạt; chặn phình token)

# Bảng giá để ƯỚC chi phí (USD / 1M token: [input, output]).
# Model không liệt kê ở đây dùng giá mặc định [1.0, 3.0]. Chỉnh theo giá thực tế.
pricing:
  gpt-4o: [2.5, 10.0]
  gpt-4o-mini: [0.15, 0.6]
  claude-opus-4-8: [15.0, 75.0]
  claude-3.5-sonnet: [3.0, 15.0]
  deepseek-chat: [0.27, 1.10]
  grok-4: [5.0, 15.0]
